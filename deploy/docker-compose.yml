# =============================================================================
# ScholarAgent — Docker Compose 本地开发编排
# =============================================================================
# 所有中间件（Redis、Qdrant、RabbitMQ）通过 Docker 管理，
# 应用服务支持两种模式：
#   1. 容器模式：docker compose up -d          （全 Docker）
#   2. 混合模式：docker compose up -d redis + go run  （开发调试）
#
# 快速启动：
#   docker compose -f deploy/docker-compose.yml build   # 构建镜像
#   docker compose -f deploy/docker-compose.yml up -d   # 启动全栈
#   docker compose -f deploy/docker-compose.yml ps      # 查看状态
#
# 停止 / 清理：
#   docker compose -f deploy/docker-compose.yml down
#   docker compose -f deploy/docker-compose.yml down -v
# =============================================================================

services:
  # =========================================================================
  # Phase 1 — Redis 会话存储
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: scholar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - scholar-net

  # =========================================================================
  # Phase 1 — Tool Service（gRPC :50052）
  # =========================================================================
  tool-service:
    build:
      context: ..
      dockerfile: tool-service/Dockerfile
    container_name: scholar-tool-service
    ports:
      - "50052:50052"
    environment:
      - TOOL_SERVICE_GRPC_PORT=50052
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scholar-net

  # =========================================================================
  # Phase 1 — Agent Core（gRPC :50051）
  # =========================================================================
  agent-core:
    build:
      context: ..
      dockerfile: agent-core/Dockerfile
    container_name: scholar-agent-core
    ports:
      - "50051:50051"
    environment:
      - AGENT_CORE_GRPC_PORT=50051
      - TOOL_SERVICE_GRPC_ADDR=tool-service:50052
      - REDIS_URL=redis://redis:6379
      - AGENT_MAX_STEPS=5
    depends_on:
      - tool-service
    restart: unless-stopped
    networks:
      - scholar-net

  # =========================================================================
  # Phase 1 — Gateway（HTTP :8080）
  # =========================================================================
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: scholar-gateway
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - AGENT_CORE_GRPC_ADDR=agent-core:50051
      - TOOL_SERVICE_GRPC_ADDR=tool-service:50052
      - REDIS_URL=redis://redis:6379
    depends_on:
      - agent-core
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - scholar-net

  # =========================================================================
  # Phase 2 — Qdrant 向量数据库（RAG 知识库）
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: scholar-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - scholar-net

  # =========================================================================
  # Phase 2 — RabbitMQ 消息队列（PDF 异步解析）
  # =========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: scholar-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scholar-net

  # =========================================================================
  # Phase 2 — PDF Worker（RabbitMQ 消费者）
  # =========================================================================
  pdf-worker:
    build:
      context: ..
      dockerfile: pdf-worker/Dockerfile
    container_name: scholar-pdf-worker
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_API_KEY=${DEEPSEEK_API_KEY}
      - EMBEDDING_BASE_URL=https://api.deepseek.com/v1
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scholar-net

  # =========================================================================
  # Phase 2 — Frontend（Nginx + React）
  # =========================================================================
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: scholar-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scholar-net

  # =========================================================================
  # Phase 3 — Prometheus 指标收集
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: scholar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped
    networks:
      - scholar-net

  # =========================================================================
  # Phase 3 — Grafana 可视化
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: scholar-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - scholar-net

volumes:
  redis_data:
  qdrant_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  scholar-net:
    driver: bridge
