# ScholarAgent — K8s ConfigMap
# 非敏感配置集中管理
apiVersion: v1
kind: ConfigMap
metadata:
  name: scholar-config
data:
  AGENT_MAX_STEPS: "5"
  SESSION_TTL_DAYS: "7"
  ARXIV_RATE_LIMIT_MS: "3000"
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
