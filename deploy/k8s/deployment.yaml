# ScholarAgent — Deployments（三微服务 2 副本）
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tool-service
  template:
    metadata:
      labels:
        app: tool-service
    spec:
      containers:
        - name: tool-service
          image: scholar-tool-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 9092
              name: metrics
          env:
            - name: TOOL_SERVICE_GRPC_PORT
              value: "50052"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-core
  template:
    metadata:
      labels:
        app: agent-core
    spec:
      containers:
        - name: agent-core
          image: scholar-agent-core:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9091
              name: metrics
          env:
            - name: AGENT_CORE_GRPC_PORT
              value: "50051"
            - name: TOOL_SERVICE_GRPC_ADDR
              value: "tool-service:50052"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: AGENT_MAX_STEPS
              valueFrom:
                configMapKeyRef:
                  name: scholar-config
                  key: AGENT_MAX_STEPS
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: scholar-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: AGENT_CORE_GRPC_ADDR
              value: "agent-core:50051"
            - name: TOOL_SERVICE_GRPC_ADDR
              value: "tool-service:50052"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
