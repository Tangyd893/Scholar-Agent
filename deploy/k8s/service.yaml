# ScholarAgent — Services
---
apiVersion: v1
kind: Service
metadata:
  name: tool-service
spec:
  selector:
    app: tool-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
    - name: metrics
      port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: agent-core
spec:
  selector:
    app: agent-core
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9091
      targetPort: 9091
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
